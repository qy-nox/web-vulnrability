services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vulnerability_scanner
      POSTGRES_USER: scanner
      POSTGRES_PASSWORD: scanner
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scanner -d vulnerability_scanner"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    networks:
      - scanner-net

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgres://scanner:scanner@postgres:5432/vulnerability_scanner
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health').read()"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    networks:
      - scanner-net

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    networks:
      - scanner-net

networks:
  scanner-net:
    driver: bridge

volumes:
  postgres-data:
