<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Web Vulnerability Scanner</title>
  <style>
    body { margin: 0; font-family: Inter, Arial, sans-serif; background: #f8fafc; color: #0f172a; }
    .container { max-width: 1024px; margin: 0 auto; padding: 24px; }
    .card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 16px; margin-top: 16px; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    input, select, button { padding: 8px 10px; border-radius: 8px; border: 1px solid #cbd5e1; }
    button { background: #2563eb; color: white; border: none; cursor: pointer; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .progress { width: 100%; height: 10px; background: #e2e8f0; border-radius: 999px; margin-top: 10px; }
    .progress > div { height: 10px; background: #2563eb; border-radius: 999px; width: 0%; transition: width .2s linear; }
    .badge { border-radius: 999px; font-size: 12px; padding: 2px 8px; color: white; }
    .critical { background: #7f1d1d; } .high { background: #991b1b; } .medium { background: #b45309; } .low { background: #1d4ed8; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { border-bottom: 1px solid #e2e8f0; text-align: left; padding: 8px; vertical-align: top; }
    small { color: #475569; }
    #monitor { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; background: #0b1020; color: #c7d2fe; padding: 10px; border-radius: 8px; min-height: 48px; }
  </style>
</head>
<body>
  <main class="container">
    <h1>Web Vulnerability Scanner <small>(3000+ checks)</small></h1>
    <section class="card">
      <h2>Start Scan</h2>
      <div class="row">
        <input id="target" type="url" value="https://example.com" placeholder="https://target.example" style="min-width: 360px;" />
        <button id="scanBtn">Start Scan</button>
      </div>
      <div class="progress"><div id="progressBar"></div></div>
      <p id="status">Ready.</p>
    </section>

    <section class="card">
      <h2>Results</h2>
      <div class="row">
        <label for="severity">Severity Filter:</label>
        <select id="severity">
          <option value="all">All</option>
          <option value="critical">Critical</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
        <label for="type">Type:</label>
        <select id="type">
          <option value="all">All</option>
        </select>
        <label for="confidence">Confidence:</label>
        <select id="confidence">
          <option value="all">All</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
        <label for="param">Parameter:</label>
        <input id="param" placeholder="payload fragment" />
        <button id="downloadHtml" disabled>HTML</button>
        <button id="downloadPdf" disabled>PDF</button>
        <button id="downloadJson" disabled>JSON</button>
        <button id="downloadCsv" disabled>CSV</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>Title</th><th>Severity</th><th>CVSS</th><th>CWE</th><th>Proof</th><th>Remediation</th>
          </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
      </table>
    </section>

    <section class="card">
      <h2>Real-time Monitoring</h2>
      <div id="monitor">Connecting to ws://localhost:8000/ws/alerts ...</div>
    </section>
  </main>

  <script>
    const progressBar = document.getElementById("progressBar");
    const status = document.getElementById("status");
    const resultsBody = document.getElementById("resultsBody");
    const severityFilter = document.getElementById("severity");
    const typeFilter = document.getElementById("type");
    const confidenceFilter = document.getElementById("confidence");
    const parameterFilter = document.getElementById("param");
    const scanBtn = document.getElementById("scanBtn");
    const monitor = document.getElementById("monitor");
    const downloads = ["downloadHtml","downloadPdf","downloadJson","downloadCsv"].map(id => document.getElementById(id));

    let scanId = "";
    let vulnerabilities = [];

    function setProgress(value) {
      progressBar.style.width = Math.max(0, Math.min(value, 100)) + "%";
    }

    function renderRows() {
      const filter = severityFilter.value;
      const typeValue = typeFilter.value;
      const confidenceValue = confidenceFilter.value;
      const parameterValue = (parameterFilter.value || "").toLowerCase();
      const rows = vulnerabilities.filter(v =>
        (filter === "all" || v.severity.toLowerCase() === filter) &&
        (typeValue === "all" || v.vulnerability_type === typeValue) &&
        (confidenceValue === "all" || (v.confidence || "").toLowerCase() === confidenceValue) &&
        (!parameterValue || (v.affected_parameter || "").toLowerCase().includes(parameterValue))
      );
      resultsBody.innerHTML = rows.slice(0, 100).map(v => `
        <tr>
          <td><strong>${v.title}</strong><br><small>${v.description || ""}</small></td>
          <td><span class="badge ${v.severity.toLowerCase()}">${v.severity}</span></td>
          <td>${v.cvss_score}</td>
          <td>${v.cwe}</td>
          <td>${v.proof_of_concept || ""}</td>
          <td>${v.remediation || ""}</td>
        </tr>
      `).join("") || `<tr><td colspan="6">No vulnerabilities yet.</td></tr>`;
    }

    async function startScan() {
      const target = document.getElementById("target").value;
      scanBtn.disabled = true;
      status.textContent = "Starting scan...";
      setProgress(10);
      try {
        const scanRes = await fetch("http://localhost:8000/api/scan", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url: target })
        });
        const scanData = await scanRes.json();
        scanId = scanData.scan_id;
        setProgress(60);

        const vulnRes = await fetch("http://localhost:8000/api/vulnerabilities");
        const vulnData = await vulnRes.json();
        vulnerabilities = vulnData.items || [];
        const types = [...new Set(vulnerabilities.map(v => v.vulnerability_type).filter(Boolean))].slice(0, 25);
        typeFilter.innerHTML = '<option value="all">All</option>' + types.map(type => `<option value="${type}">${type}</option>`).join("");
        renderRows();
        downloads.forEach(btn => btn.disabled = !scanId);
        setProgress(100);
        status.textContent = `Completed scan ${scanId}. Findings: ${vulnerabilities.length}`;
      } catch (err) {
        setProgress(0);
        status.textContent = "Scan failed: " + err;
      } finally {
        scanBtn.disabled = false;
      }
    }

    function download(name, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = name;
      a.click();
      URL.revokeObjectURL(url);
    }

    document.getElementById("downloadJson").onclick = () => {
      download(`${scanId || "scan"}-report.json`, JSON.stringify({ scan_id: scanId, vulnerabilities }, null, 2), "application/json");
    };
    document.getElementById("downloadCsv").onclick = () => {
      const rows = vulnerabilities.map(v => `${v.id},${v.title},${v.severity},${v.cvss_score},${v.cwe}`);
      download(`${scanId || "scan"}-report.csv`, "id,title,severity,cvss,cwe\n" + rows.join("\n"), "text/csv");
    };
    document.getElementById("downloadHtml").onclick = () => {
      download(`${scanId || "scan"}-report.html`, `<html><body><h1>Scan ${scanId}</h1><p>Findings: ${vulnerabilities.length}</p></body></html>`, "text/html");
    };
    document.getElementById("downloadPdf").onclick = () => {
      download(`${scanId || "scan"}-report.pdf`, "PDF export placeholder", "application/pdf");
    };

    severityFilter.onchange = renderRows;
    typeFilter.onchange = renderRows;
    confidenceFilter.onchange = renderRows;
    parameterFilter.oninput = renderRows;
    scanBtn.onclick = startScan;

    try {
      const ws = new WebSocket("ws://localhost:8000/ws/alerts");
      ws.onmessage = (event) => { monitor.textContent = `WS: ${event.data}`; };
      ws.onerror = () => { monitor.textContent = "WebSocket unavailable. API still operational."; };
    } catch (_) {
      monitor.textContent = "WebSocket unavailable. API still operational.";
    }
  </script>
</body>
</html>
